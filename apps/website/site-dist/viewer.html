<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>OhMyPerf — Drop a report</title>
<style>
:root{color-scheme:light dark;--accent:#4338ca;--text:#111827;--muted:#6b7280;--bg:#ffffff;--panel:#f7f7f8;--border:#e5e7eb;--danger:#b91c1c}
@media(prefers-color-scheme:dark){:root{--text:#e5e7eb;--muted:#94a3b8;--bg:#0b1020;--panel:#111827;--border:#1f2937;--accent:#818cf8;--danger:#f87171}}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);background:var(--bg);min-height:100vh}
.dropzone{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
.card{max-width:520px;width:100%;text-align:center;border:2px dashed var(--border);border-radius:16px;padding:48px 32px;background:var(--panel)}
.card.dragging{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--panel))}
.card h1{margin:0 0 8px;font-size:22px}
.card p{margin:8px 0;color:var(--muted)}
.card input[type=file]{display:none}
.btn{display:inline-block;margin-top:16px;padding:10px 18px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:500;cursor:pointer}
.btn:hover{filter:brightness(1.1)}
.error{margin-top:16px;color:var(--danger);font-weight:500}
.muted{font-size:12px;color:var(--muted);margin-top:24px}
</style>
</head>
<body>
<div class="dropzone" id="dropzone">
<div class="card" id="card">
<h1>Drop a report.json</h1>
<p>Or paste JSON, or click below to choose a file.</p>
<label class="btn" for="file-input">Choose file</label>
<input type="file" id="file-input" accept="application/json,.json">
<p class="muted">Renders entirely in your browser. No upload. No network requests.</p>
<div id="error" class="error" hidden></div>
</div>
</div>
<script type="module" src="./viewer-page.bundle.js"></script>
</body>
</html>
