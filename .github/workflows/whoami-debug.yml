name: NPM whoami debug

on:
  workflow_dispatch:

jobs:
  whoami:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -uo pipefail
          echo "npm whoami:"
          npm whoami 2>&1 || echo "(whoami failed)"
          echo ""
          echo "npm access list packages:"
          npm access list packages 2>&1 | head -30 || echo "(access list failed)"
          echo ""
          echo "npm token list:"
          npm token list 2>&1 | head -10 || echo "(token list failed)"
